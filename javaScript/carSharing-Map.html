<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Car Sharing Stationen</title>
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <link rel="stylesheet" href="carCss.css" />
  </head>
  <body>
    <h1>Car Sharing Stationen</h1>
    <div id="map"></div>
    <script>
      let stations = [];

      var map = L.map("map").setView([46.49067, 11.33982], 10);
      L.tileLayer("https://tile.openstreetmap.org/{z}/{x}/{y}.png", {
        maxZoom: 19,
        attribution:
          '&copy; <a href="http://www.openstreetmap.org/copyright">OpenStreetMap</a>',
      }).addTo(map);

      async function fetchData() {
        try {
          const response = await fetch(
            "https://mobility.api.opendatahub.com/v2/flat/CarsharingStation",
          );
          const result = await response.json();
          stations = result.data;
          displayData(stations);
        } catch (error) {
          console.error("Fehler beim Laden der Daten:", error);
          document.body.innerHTML += "<p>Fehler beim Laden der Daten.</p>";
        }
      }

      function displayData(stations) {
        stations.forEach(function (station) {
          console.log(station.sname);
          var marker = L.marker([
            station.scoordinate.y,
            station.scoordinate.x,
          ]).addTo(map);
          marker.bindPopup(
            "<b>" +
              station.sname +
              "</b><br>Active:" +
              station.sactive +
              "<br>Available: " +
              station.savailable,
          );
        });
      }

      function onLocationFound(e) {
        var radius = e.accuracy;
        const userLatLng = e.latlng;
        L.marker(e.latlng).addTo(map).bindPopup("You are here!").openPopup();

        let closestStation = null;
        let minDistance = Infinity;
        if (stations.length > 0) {
          stations.forEach((station) => {
            const stationLatLng = L.latLng(
              station.scoordinate.y,
              station.scoordinate.x,
            );
            const distance = userLatLng.distanceTo(stationLatLng);

            if (distance < minDistance) {
              minDistance = distance;
              closestStation = station;
            }
          });
          if (closestStation) {
            const distKm = (minDistance / 1000).toFixed(2);
            var popup = L.popup()
              .setLatLng([closestStation.scoordinate.y, closestStation.scoordinate.x])
              .setContent("Nächste Station: "+distKm+"km entfernt")
              .openOn(map);            
          }
        }
      }

      function onLocationError(e) {
        alert(e.message);
      }

      fetchData();
      map.on("locationfound", onLocationFound);
      map.locate({ setView: true, maxZoom: 13 });
    </script>
  </body>
</html>
