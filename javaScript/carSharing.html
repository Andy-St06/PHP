<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Car Sharing Stationen</title>
  </head>
  <body>
    <h1>Car Sharing Stationen</h1>

    <table style="width: 100; border: solid">
      <thead>
        <tr>
          <th>Name</th>
          <th>Aktiv</th>
          <th>Verfügbar</th>
          <th>Koordinate X</th>
          <th>Koordinate Y</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>

    <script>
      

      async function fetchData() {
        try {
          const response = await fetch(
            "https://mobility.api.opendatahub.com/v2/flat/CarsharingStation",
          );
          const result = await response.json();
          const stations = result.data;
          displayData(stations);
        } catch (error) {
          console.error("Fehler beim Laden der Daten:", error);
          document.body.innerHTML += "<p>Fehler beim Laden der Daten.</p>";
        }
      }

      function displayData(stations) {
        const tableBody = document.getElementById("tableBody");

        stations.forEach((station) => {
          const row = document.createElement("tr");
          row.innerHTML = `
            <td>${station.sname || "Unbekannt"}</td>
            <td>${station.sactive ? "Ja" : "Nein"}</td>
            <td>${station.savailable ? "Ja" : "Nein"}</td>
            <td>${station.scoordinate.x}</td>
            <td>${station.scoordinate.y}</td>
          `;

          tableBody.appendChild(row);
        });
      }
      fetchData();
    </script>
  </body>
</html>
