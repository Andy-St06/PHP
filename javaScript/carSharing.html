<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Car Sharing</title>
  </head>
  <body>
    <script>
      async function fetchData() {
        try {
          const response = await fetch("https://mobility.api.opendatahub.com/v2/flat/CarsharingStation"); // 1. Abrufen
          const data = await response.json(); // 2. Parsen
          return data;
        } catch (error) {
          console.error("Fehler:", error);
        }
      }
      const data = fetchData();
      console.log(data);
    </script>
    <h1>Car Sharing</h1>
    <table>
      <th>Active</th>
      <th>Available</th>
      <th>Coordinate x</th>
      <th>Coordinate y</th>
      <th>Coordinate rid</th>
    </table>
    <p>
    <script>
        let len = data.length;
        for(let i = 0; i < len; i++){
            document.write(data[i]);
        }
    </script>
    </p>
  </body>
</html>
